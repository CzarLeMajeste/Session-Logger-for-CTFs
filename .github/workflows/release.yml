# release.yml – Cross-platform build and release workflow.
#
# Triggers:
#   • Push of a version tag (e.g. v1.0.0) → full build + GitHub Release
#   • Manual dispatch from the Actions tab  → build only (no release step)
#
# Produces:
#   session-recorder CLI (Rust):
#   • Windows 10/11  (x86_64)  →  session-recorder.exe
#   • macOS 13+ Intel + Apple Silicon  →  universal binary via lipo
#   • Debian/Ubuntu  (x86_64)  →  .deb package (via cargo-deb)
#   • RPM-based (x86_64)       →  .rpm package (via cargo-generate-rpm)
#
#   Desktop GUI (Python / PyInstaller):
#   • Windows 10/11  (x86_64)  →  ctf-session-logger-gui.exe
#   • macOS (arm64)            →  ctf-session-logger-gui
#   • Linux  (x86_64)          →  ctf-session-logger-gui

name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # ── Linux: .deb and .rpm ───────────────────────────────────────────────────
  linux:
    name: Linux x86_64 (.deb + .rpm)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('session-recorder/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build release binary
        working-directory: session-recorder
        run: cargo build --release

      - name: Package .deb
        working-directory: session-recorder
        run: cargo deb --no-build

      - name: Package .rpm
        working-directory: session-recorder
        run: cargo generate-rpm

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: session-recorder/target/debian/*.deb

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: session-recorder/target/generate-rpm/*.rpm

      # ── GUI (Linux) ──────────────────────────────────────────────────────
      - name: Install Python tkinter (Linux)
        run: sudo apt-get install -y python3-tk

      - name: Set up Python (Linux GUI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller (Linux)
        run: pip install pyinstaller

      - name: Build GUI (Linux)
        run: |
          pyinstaller --onefile --windowed \
            --add-data "dump2note.py:." \
            --name ctf-session-logger-gui \
            gui.py

      - name: Upload Linux GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-linux-x86_64
          path: dist/ctf-session-logger-gui

  # ── Windows 10 / 11 (x86_64-pc-windows-msvc) ─────────────────────────────
  windows:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
          key: windows-cargo-${{ hashFiles('session-recorder/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binary
        working-directory: session-recorder
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: session-recorder/target/x86_64-pc-windows-msvc/release/session-recorder.exe

      # ── GUI (Windows) ────────────────────────────────────────────────────
      - name: Set up Python (Windows GUI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller (Windows)
        run: pip install pyinstaller

      - name: Build GUI (Windows)
        run: |
          pyinstaller --onefile --windowed `
            --add-data "dump2note.py;." `
            --name ctf-session-logger-gui `
            gui.py

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-windows-x86_64
          path: dist/ctf-session-logger-gui.exe

  # ── macOS universal binary (Intel + Apple Silicon) ────────────────────────
  macos:
    name: macOS universal
    runs-on: macos-14   # Apple Silicon runner; can cross-compile to x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, both Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('session-recorder/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build for x86_64 (Intel)
        working-directory: session-recorder
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for aarch64 (Apple Silicon)
        working-directory: session-recorder
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary with lipo
        working-directory: session-recorder
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/session-recorder \
            target/aarch64-apple-darwin/release/session-recorder \
            -output target/universal-apple-darwin/release/session-recorder
          echo "Universal binary info:"
          lipo -info target/universal-apple-darwin/release/session-recorder

      - name: Upload macOS universal binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: session-recorder/target/universal-apple-darwin/release/session-recorder

      # ── GUI (macOS) ──────────────────────────────────────────────────────
      - name: Set up Python (macOS GUI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller (macOS)
        run: pip install pyinstaller

      - name: Build GUI (macOS)
        run: |
          pyinstaller --onefile --windowed \
            --add-data "dump2note.py:." \
            --name ctf-session-logger-gui \
            gui.py

      - name: Upload macOS GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-macos-arm64
          path: dist/ctf-session-logger-gui

  # ── GitHub Release (tag pushes only) ─────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [linux, windows, macos]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv artifacts/windows-x86_64/session-recorder.exe \
             artifacts/session-recorder-${TAG}-windows-x86_64.exe
          mv artifacts/macos-universal/session-recorder \
             artifacts/session-recorder-${TAG}-macos-universal
          chmod +x artifacts/session-recorder-${TAG}-macos-universal
          # deb and rpm keep their auto-generated names
          find artifacts/deb-package -name "*.deb" \
            -exec mv {} artifacts/session-recorder-${TAG}-x86_64.deb \;
          find artifacts/rpm-package -name "*.rpm" \
            -exec mv {} artifacts/session-recorder-${TAG}-x86_64.rpm \;
          # GUI executables
          mv artifacts/gui-windows-x86_64/ctf-session-logger-gui.exe \
             artifacts/ctf-session-logger-gui-${TAG}-windows-x86_64.exe
          mv artifacts/gui-macos-arm64/ctf-session-logger-gui \
             artifacts/ctf-session-logger-gui-${TAG}-macos-arm64
          chmod +x artifacts/ctf-session-logger-gui-${TAG}-macos-arm64
          mv artifacts/gui-linux-x86_64/ctf-session-logger-gui \
             artifacts/ctf-session-logger-gui-${TAG}-linux-x86_64
          chmod +x artifacts/ctf-session-logger-gui-${TAG}-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/session-recorder-*-windows-x86_64.exe
            artifacts/session-recorder-*-macos-universal
            artifacts/session-recorder-*-x86_64.deb
            artifacts/session-recorder-*-x86_64.rpm
            artifacts/ctf-session-logger-gui-*-windows-x86_64.exe
            artifacts/ctf-session-logger-gui-*-macos-arm64
            artifacts/ctf-session-logger-gui-*-linux-x86_64
